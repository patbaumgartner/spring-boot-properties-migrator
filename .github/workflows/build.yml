name: Build

on:
  push:
    branches: [ "main" ]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up Temurin 17
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4.8.0
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Build and install Maven plugin
        run: mvn -B -ntp install -pl spring-boot-properties-migrator-maven-plugin -am

      - name: Run Maven sample regression tests
        run: |
          REVISION=$(sed -n 's/^-Drevision=//p' .mvn/maven.config | head -n1)
          ./samples/spring-boot-3.5-maven-sample/mvnw -B -ntp -f samples/spring-boot-3.5-maven-sample/pom.xml -Dmigrator.version="${REVISION}" test

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@748248ddd2a24f49513d8f472f81c3a07d4d50e1 # v4.4.4

      - name: Build Gradle plugin
        run: ./spring-boot-properties-migrator-gradle-plugin/gradlew -p spring-boot-properties-migrator-gradle-plugin build --no-daemon

      - name: Run Gradle sample regression tests
        run: ./samples/spring-boot-3.5-gradle-sample/gradlew -p samples/spring-boot-3.5-gradle-sample test --no-daemon
