name: Build

on:
  push:
    branches: [ "main" ]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Java 17
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5.6.0
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Build Maven plugin
        run: mvn -B -ntp install -pl spring-boot-properties-migrator-maven-plugin -am

      - name: Run Maven sample regression tests
        run: |
          REVISION=$(sed -n 's/^-Drevision=//p' .mvn/maven.config | head -n1)
          ./samples/spring-boot-3.5-maven-sample/mvnw -B -ntp \
            -f samples/spring-boot-3.5-maven-sample/pom.xml \
            -Dmigrator.version="${REVISION}" test

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0

      - name: Build Gradle plugin
        run: ./spring-boot-properties-migrator-gradle-plugin/gradlew -p spring-boot-properties-migrator-gradle-plugin build --no-daemon

      - name: Run Gradle sample regression tests
        run: |
          ./samples/spring-boot-3.5-gradle-sample/gradlew \
            -p samples/spring-boot-3.5-gradle-sample \
            test --no-daemon
