name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - name: Set up Java 17
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Resolve release version
        id: release-version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Prepare release version files
        run: |
          RELEASE_VERSION="${{ steps.release-version.outputs.version }}"
          sed -i -E "s#^-Drevision=.*#-Drevision=${RELEASE_VERSION}#" .mvn/maven.config
          perl -0pi -e 's#<revision>[^<]+</revision>#<revision>'"$RELEASE_VERSION"'</revision>#' pom.xml

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0

      - name: Build Gradle plugin
        run: |
          ./spring-boot-properties-migrator-gradle-plugin/gradlew \
            -p spring-boot-properties-migrator-gradle-plugin \
            -PreleaseVersion=${{ steps.release-version.outputs.version }} \
            build --no-daemon

      - name: Publish Gradle plugin
        run: |
          ./spring-boot-properties-migrator-gradle-plugin/gradlew \
            -p spring-boot-properties-migrator-gradle-plugin \
            -PreleaseVersion=${{ steps.release-version.outputs.version }} \
            publishPlugins --no-daemon
        env:
          GRADLE_PUBLISH_KEY: ${{ secrets.GRADLE_PUBLISH_KEY }}
          GRADLE_PUBLISH_SECRET: ${{ secrets.GRADLE_PUBLISH_SECRET }}

      - name: Stage Maven plugin for JReleaser
        run: |
          rm -rf spring-boot-properties-migrator-maven-plugin/target/staging-deploy
          mvn -B -ntp -DskipTests deploy -pl spring-boot-properties-migrator-maven-plugin -am \
            -Drevision=${{ steps.release-version.outputs.version }} \
            -DaltDeploymentRepository=staging::file:${GITHUB_WORKSPACE}/spring-boot-properties-migrator-maven-plugin/target/staging-deploy

      - name: Prepare JReleaser config directory
        run: |
          mkdir -p "$HOME/.jreleaser"
          : > "$HOME/.jreleaser/config.properties"

      - name: Run JReleaser
        uses: jreleaser/release-action@90ac653bb9c79d11179e65d81499f3f34527dcd5 # 2.5.0
        env:
          JRELEASER_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          JRELEASER_MAVENCENTRAL_SONATYPE_USERNAME: ${{ secrets.JRELEASER_NEXUS2_USERNAME }}
          JRELEASER_MAVENCENTRAL_SONATYPE_PASSWORD: ${{ secrets.JRELEASER_NEXUS2_PASSWORD }}
          JRELEASER_GPG_PUBLIC_KEY: ${{ secrets.JRELEASER_GPG_PUBLIC_KEY }}
          JRELEASER_GPG_SECRET_KEY: ${{ secrets.JRELEASER_GPG_SECRET_KEY }}
          JRELEASER_GPG_PASSPHRASE: ${{ secrets.JRELEASER_GPG_PASSPHRASE }}
        with:
          version: 1.24.0
          setup-java: false
          arguments: full-release
