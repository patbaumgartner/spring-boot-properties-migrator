name: Feature request
description: Suggest a new capability for property migration.
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: What migration pain point are you trying to solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: Describe the suggested API, behavior, and examples.
    validations:
      required: true
