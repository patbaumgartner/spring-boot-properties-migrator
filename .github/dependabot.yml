version: 2
updates:
- package-ecosystem: github-actions
  directory: /
  schedule:
    interval: weekly
    day: monday
    time: 06:00
    timezone: Europe/Zurich
  open-pull-requests-limit: 5
  labels:
  - dependencies
  - github-actions
  commit-message:
    prefix: ci(deps)
    include: scope
- package-ecosystem: maven
  directory: /
  schedule:
    interval: weekly
    day: monday
    time: 06:00
    timezone: Europe/Zurich
  open-pull-requests-limit: 10
  labels:
  - dependencies
  - maven
  commit-message:
    prefix: chore(deps)
    prefix-development: chore(deps-dev)
    include: scope
- package-ecosystem: maven
  directory: /samples/spring-boot-3.5-maven-sample
  schedule:
    interval: weekly
    day: monday
    time: 06:00
    timezone: Europe/Zurich
  ignore:
  - dependency-name: org.springframework.boot:spring-boot-starter-parent
    update-types:
    - version-update:semver-major
    - version-update:semver-minor
  open-pull-requests-limit: 10
  labels:
  - dependencies
  - maven
  commit-message:
    prefix: chore(deps)
    prefix-development: chore(deps-dev)
    include: scope
- package-ecosystem: gradle
  directory: /
  schedule:
    interval: weekly
    day: monday
    time: 06:00
    timezone: Europe/Zurich
  open-pull-requests-limit: 10
  labels:
  - dependencies
  - gradle
  commit-message:
    prefix: chore(deps)
    prefix-development: chore(deps-dev)
    include: scope
- package-ecosystem: gradle
  directory: /samples/spring-boot-3.5-gradle-sample
  schedule:
    interval: weekly
    day: monday
    time: 06:00
    timezone: Europe/Zurich
  ignore:
  - dependency-name: org.springframework.boot:spring-boot-autoconfigure
    update-types:
    - version-update:semver-major
    - version-update:semver-minor
  open-pull-requests-limit: 10
  labels:
  - dependencies
  - gradle
  commit-message:
    prefix: chore(deps)
    prefix-development: chore(deps-dev)
    include: scope
